<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建改包 - 在线分包管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;}
        body {font-family: "Microsoft Yahei", sans-serif;background-color: #F2F3F5;color: #1D2129;}
        :root {
            --primary: #165DFF;--success: #00B42A;--warning: #FF7D00;--danger: #F53F3F;
            --gray-100: #F2F3F5;--gray-200: #E5E6EB;--gray-300: #C9CDD4;
            --gray-600: #86909C;--gray-900: #1D2129;
        }
        .content {padding: 24px;flex: 1;}
        /* 卡片 */
        .card {background: white;border-radius: 12px;box-shadow: 0 2px 8px rgba(0,0,0,0.06);}
        .card-body {padding: 24px;}
        /* 标签页 */
        .tabs {display: flex;border-bottom: 2px solid var(--gray-200);margin-bottom: 24px;}
        .tab {padding: 12px 24px;cursor: pointer;font-size: 14px;color: var(--gray-600);border-bottom: 2px solid transparent;transition: all 0.2s;}
        .tab:hover {color: var(--primary);}
        .tab.active {color: var(--primary);border-bottom-color: var(--primary);font-weight: 500;}
        /* 按钮 */
        .btn {padding: 8px 24px;border-radius: 8px;border: none;cursor: pointer;font-size: 14px;transition: all 0.3s;display: inline-flex;align-items: center;justify-content: center;gap: 6px;text-decoration: none;}
        .btn-primary {background-color: var(--primary);color: white;}
        .btn-primary:hover {background-color: #0D47A1;}
        .btn-default {background-color: white;border: 1px solid var(--gray-200);color: var(--gray-900);}
        .btn-default:hover {background-color: var(--gray-100);}
        /* 表单 */
        .form-group {margin-bottom: 20px;}
        .form-label {display: block;margin-bottom: 8px;font-size: 14px;font-weight: 500;color: var(--gray-900);}
        .form-input, .form-select, .form-textarea {width: 100%;height: 44px;padding: 0 12px;border: 1px solid var(--gray-200);border-radius: 8px;font-size: 14px;}
        .form-textarea {height: auto;min-height: 80px;padding: 12px;resize: vertical;}
        .form-input:focus, .form-select:focus, .form-textarea:focus {outline: none;border-color: var(--primary);}
        .required {color: var(--danger);}
        .grid {display: grid;gap: 24px;}
        .grid-cols-2 {grid-template-columns: repeat(2, 1fr);}
        .col-span-2 {grid-column: span 2;}
        .flex {display: flex;}
        .justify-end {justify-content: flex-end;}
        .gap-3 {gap: 12px;}
        /* 自定义下拉 */
        .custom-select {position: relative;}
        .custom-dropdown {position: absolute;top: 100%;left: 0;right: 0;background: white;border: 1px solid var(--gray-200);border-radius: 8px;margin-top: 4px;max-height: 200px;overflow-y: auto;z-index: 10;display: none;}
        .custom-dropdown.show {display: block;}
        .custom-dropdown-item {padding: 10px 16px;cursor: pointer;transition: all 0.2s;}
        .custom-dropdown-item:hover {background: var(--gray-100);}
        /* 上传区域 */
        .upload-area {border: 2px dashed var(--gray-300);border-radius: 8px;padding: 12px;text-align: center;cursor: pointer;transition: all 0.2s;min-height: 80px;display: flex;flex-direction: column;justify-content: center;align-items: center;}
        .upload-area:hover {border-color: var(--primary);}
        .upload-area i {font-size: 24px;color: var(--gray-600);margin-bottom: 4px;}
        .upload-area p {font-size: 11px;color: var(--gray-600);}
        .upload-preview {display: flex;align-items: center;gap: 12px;margin-top: 12px;padding: 12px;background: var(--gray-100);border-radius: 8px;}
        .upload-preview img {width: 40px;height: 40px;object-fit: cover;border-radius: 4px;}
        .upload-preview .file-name {flex: 1;font-size: 14px;color: var(--gray-900);}
        .upload-preview .remove-btn {background: none;border: none;color: var(--danger);cursor: pointer;font-size: 16px;}
        /* V3签名文件区域样式 */
        .v3-sign-container {display: flex;flex-direction: column;gap: 12px;}
        .v3-sign-upload {border: 2px dashed var(--gray-300);border-radius: 8px;padding: 12px;text-align: center;cursor: pointer;transition: all 0.2s;min-height: 80px;display: flex;flex-direction: column;justify-content: center;align-items: center;}
        .v3-sign-upload:hover {border-color: var(--primary);}
        .v3-sign-upload i {font-size: 24px;color: var(--gray-600);margin-bottom: 4px;}
        .v3-sign-upload p {font-size: 11px;color: var(--gray-600);}
        .v3-sign-file-info {display: none;align-items: center;gap: 12px;padding: 12px;background: var(--gray-100);border-radius: 8px;border: 1px solid var(--gray-200);}
        .v3-sign-file-info.show {display: flex;}
        .v3-sign-file-info i {font-size: 24px;color: var(--primary);}
        .v3-sign-file-info .file-details {flex: 1;}
        .v3-sign-file-info .file-name {font-size: 14px;color: var(--gray-900);}
        /* ICON预览删除遮罩 */
        .icon-preview-overlay {position: absolute;top: 0;left: 0;right: 0;bottom: 0;background: rgba(0,0,0,0.4);display: flex;align-items: center;justify-content: center;opacity: 0;transition: opacity 0.2s;cursor: pointer;}
        .icon-preview-area:hover .icon-preview-overlay {opacity: 1;}
        .v3-sign-file-info .file-size {font-size: 12px;color: var(--gray-600);}
        .v3-sign-file-info .remove-btn {background: none;border: none;color: var(--danger);cursor: pointer;font-size: 16px;padding: 4px;}
        .v3-sign-file-info .remove-btn:hover {color: #d93025;}
        /* 密钥别名和密钥密码同行布局 */
        .key-row {display: flex;gap: 24px;align-items: flex-start;}
        .key-row .form-group {flex: 1;margin-bottom: 0;}
        .key-alias-group, .key-password-group {display: none;}
        .key-alias-group.show, .key-password-group.show {display: block;}
        /* 消息提示 */
        .message-box {position: fixed;top: 80px;right: 24px;padding: 12px 24px;border-radius: 8px;color: white;font-size: 14px;z-index: 99999;animation: slideIn 0.3s ease;max-width: 300px;}
        .message-success {background: var(--success);}
        .message-error {background: var(--danger);}
        @keyframes slideIn {from {transform: translateX(100%);opacity: 0;} to {transform: translateX(0);opacity: 1;}}
        /* 弹窗样式 */
        .modal-overlay {position: fixed;top: 0;left: 0;right: 0;bottom: 0;background: rgba(0,0,0,0.5);display: none;justify-content: center;align-items: center;z-index: 9999;}
        .modal-overlay.show {display: flex;}
        .modal {background: white;border-radius: 16px;padding: 0;width: 440px;max-width: 90vw;animation: scaleIn 0.3s ease;}
        @keyframes scaleIn {
            from {opacity: 0;transform: scale(0.95);}
            to {opacity: 1;transform: scale(1);}
        }
        .modal-header {padding: 20px 24px;border-bottom: 1px solid var(--gray-200);display: flex;justify-content: space-between;align-items: center;}
        .modal-title {font-size: 16px;font-weight: 600;color: var(--gray-900);}
        .modal-close {background: none;border: none;font-size: 24px;cursor: pointer;color: var(--gray-600);padding: 4px;}
        .modal-close:hover {color: var(--gray-900);}
        .modal-body {padding: 24px;}
        .modal-footer {padding: 16px 24px;border-top: 1px solid var(--gray-200);display: flex;justify-content: flex-end;gap: 12px;}
        /* 表单样式补充 */
        .form-group {margin-bottom: 20px;}
        .form-label {display: block;margin-bottom: 8px;font-size: 14px;font-weight: 500;color: var(--gray-900);}
        .form-input {width: 100%;height: 44px;padding: 0 12px;border: 1px solid var(--gray-200);border-radius: 8px;font-size: 14px;transition: all 0.2s;}
        .form-input:focus {outline: none;border-color: var(--primary);box-shadow: 0 0 0 3px rgba(22,93,255,0.1);}
        .form-input:disabled {background-color: var(--gray-100);cursor: not-allowed;}
        .required {color: var(--danger);}
        
        /* 确认弹窗 */
        .confirm-icon {font-size: 64px;text-align: center;margin-bottom: 16px;color: var(--danger);}
        .confirm-message {text-align: center;font-size: 16px;color: var(--gray-900);margin-bottom: 8px;}
        .confirm-desc {text-align: center;font-size: 14px;color: var(--gray-600);margin-bottom: 24px;}
        
        /* 渠道选择器样式 */
        .channel-input-wrapper {position: relative;display: flex;}
        .channel-input-wrapper .form-input {flex: 1;border-top-right-radius: 0;border-bottom-right-radius: 0;border-right: none;}
        .channel-select-btn {width: 44px;height: 44px;background: var(--gray-100);border: 1px solid var(--gray-200);border-top-right-radius: 8px;border-bottom-right-radius: 8px;cursor: pointer;display: flex;align-items: center;justify-content: center;color: var(--gray-600);transition: all 0.2s;}
        .channel-select-btn:hover {background: var(--gray-200);color: var(--primary);}
        .channel-modal {width: 700px;max-height: 80vh;display: flex;flex-direction: column;}
        .channel-modal .modal-body {padding: 0;flex: 1;overflow: hidden;display: flex;flex-direction: column;}
        .channel-search {padding: 16px 24px;border-bottom: 1px solid var(--gray-200);}
        .channel-search-wrapper {display: flex;gap: 8px;align-items: flex-start;flex-wrap: wrap;}
        .channel-search-input {flex: 1;height: 40px;padding: 0 12px;border: 1px solid var(--gray-200);border-radius: 8px;font-size: 14px;}
        .channel-search-input:focus {outline: none;border-color: var(--primary);}
        .channel-search-btn {height: 40px;padding: 0 20px;background: var(--primary);color: white;border: none;border-radius: 8px;cursor: pointer;font-size: 14px;transition: all 0.2s;flex-shrink: 0;}
        .channel-search-btn:hover {background: #0D47A1;}
        /* 平台多选下拉组件 */
        .platform-filter-wrapper {position: relative;flex-shrink: 0;}
        .platform-filter-btn {height: 40px;padding: 0 36px 0 14px;background: white;border: 1px solid var(--gray-200);border-radius: 8px;cursor: pointer;font-size: 14px;color: var(--gray-600);display: flex;align-items: center;gap: 6px;transition: all 0.2s;white-space: nowrap;position: relative;min-width: 130px;}
        .platform-filter-btn:hover {border-color: var(--primary);color: var(--primary);}
        .platform-filter-btn.active {border-color: var(--primary);color: var(--primary);background: rgba(22,93,255,0.04);}
        .platform-filter-btn i {font-size: 10px;position: absolute;right: 12px;top: 50%;transform: translateY(-50%);transition: transform 0.2s;}
        .platform-filter-btn.active i {transform: translateY(-50%) rotate(180deg);}
        .platform-dropdown {display: none;position: absolute;top: 44px;left: 0;background: white;border: 1px solid var(--gray-200);border-radius: 8px;box-shadow: 0 4px 16px rgba(0,0,0,0.12);z-index: 100;min-width: 200px;max-height: 240px;overflow-y: auto;padding: 4px 0;}
        .platform-dropdown.show {display: block;}
        .platform-dropdown-item {display: flex;align-items: center;gap: 8px;padding: 10px 14px;cursor: pointer;font-size: 14px;color: var(--gray-900);transition: background 0.15s;}
        .platform-dropdown-item:hover {background: rgba(22,93,255,0.04);}
        .platform-dropdown-item input[type="checkbox"] {width: 16px;height: 16px;accent-color: var(--primary);cursor: pointer;}
        .platform-dropdown-item label {cursor: pointer;flex: 1;}
        .platform-selected-tags {display: flex;flex-wrap: wrap;gap: 6px;flex: 1;align-items: center;min-height: 40px;}
        .platform-tag {display: inline-flex;align-items: center;gap: 4px;padding: 4px 10px;background: rgba(22,93,255,0.08);color: var(--primary);border: 1px solid rgba(22,93,255,0.2);border-radius: 16px;font-size: 13px;}
        .platform-tag.account-tag {background: rgba(0,168,112,0.08);color: #00a870;border-color: rgba(0,168,112,0.2);}
        .platform-tag-remove {cursor: pointer;font-size: 12px;opacity: 0.7;transition: opacity 0.15s;line-height: 1;}
        .platform-tag-remove:hover {opacity: 1;}
        .platform-dropdown-footer {display: flex;justify-content: space-between;padding: 8px 14px;border-top: 1px solid var(--gray-100);}
        .platform-dropdown-footer button {font-size: 13px;padding: 4px 12px;border: 1px solid var(--gray-200);background: white;border-radius: 6px;cursor: pointer;transition: all 0.2s;}
        .platform-dropdown-footer button:hover {border-color: var(--primary);color: var(--primary);}
        .platform-dropdown-footer button.primary {background: var(--primary);color: white;border-color: var(--primary);}
        .channel-selected-info {padding: 8px 24px;border-bottom: 1px solid var(--gray-200);font-size: 13px;color: var(--gray-600);}
        .channel-list-container {flex: 1;overflow-y: auto;padding: 8px 0;}
        .channel-list-header {display: grid;grid-template-columns: 50px 1fr 1fr;padding: 12px 24px;background: var(--gray-100);font-size: 13px;font-weight: 600;color: var(--gray-600);position: sticky;top: 0;z-index: 1;}
        .channel-item {display: grid;grid-template-columns: 50px 1fr 1fr;padding: 14px 24px;align-items: center;border-bottom: 1px solid var(--gray-100);transition: all 0.2s;cursor: pointer;}
        .channel-item:hover {background: rgba(22,93,255,0.03);}
        .channel-item.selected {background: rgba(22,93,255,0.08);}
        .channel-checkbox {width: 18px;height: 18px;accent-color: var(--primary);cursor: pointer;}
        .channel-platform {font-size: 14px;color: var(--gray-900);}
        .channel-account {font-size: 14px;color: var(--gray-600);}
        .channel-empty {text-align: center;padding: 40px;color: var(--gray-600);font-size: 14px;}
        .channel-pagination {padding: 12px 24px;border-top: 1px solid var(--gray-200);display: flex;justify-content: center;align-items: center;gap: 8px;}
        .channel-pagination button {padding: 6px 12px;border: 1px solid var(--gray-200);background: white;border-radius: 6px;cursor: pointer;font-size: 13px;transition: all 0.2s;}
        .channel-pagination button:hover {border-color: var(--primary);color: var(--primary);}
        .channel-pagination button:disabled {opacity: 0.5;cursor: not-allowed;}
        .channel-pagination button.active {background: var(--primary);color: white;border-color: var(--primary);}
        .channel-pagination span {font-size: 13px;color: var(--gray-600);}
        .channel-footer {padding: 16px 24px;border-top: 1px solid var(--gray-200);display: flex;justify-content: flex-end;align-items: center;gap: 12px;}
        .form-row-2 {display: grid;grid-template-columns: 1fr 1fr;gap: 16px;}
    .form-row-3 {display: grid;grid-template-columns: 1fr 1fr 1fr;gap: 16px;}
    .section-title {font-size: 16px;font-weight: 600;color: var(--gray-900);margin-bottom: 12px;padding-bottom: 8px;border-bottom: 1px solid var(--gray-200);}
</style>
</head>
<body>
    <div id="mainPage">
        <main class="content">
                <div class="card">
                    <div class="card-body">
                        <div class="tabs">
                            <div class="tab active">基础信息</div>
                        </div>
                        <form id="repkgForm" class="grid grid-cols-2 gap-6">
                            <!-- 上传/选择游戏区域 - 与签名文件交互一致 -->
                            <div class="form-group">
                                <label class="form-label">游戏 <span class="required">*</span></label>
                                <div class="game-select-tabs" style="display: flex;gap: 8px;margin-bottom: 12px;">
                                    <button type="button" id="tab_upload" class="btn btn-sm btn-primary" onclick="switchGameMode('upload')">上传母包</button>
                                    <button type="button" id="tab_select" class="btn btn-sm btn-default" onclick="switchGameMode('select')">选择已有</button>
                                </div>
                                
                                <!-- 上传模式 -->
                                <div id="game_upload_mode" class="game-mode">
                                    <div class="v3-sign-container">
                                        <div class="v3-sign-upload" id="gameUploadArea" onclick="document.getElementById('gameFileInput').click()">
                                            <i class="fa fa-gamepad"></i>
                                            <p>点击上传游戏母包</p>
                                            <input type="file" id="gameFileInput" accept=".apk,.ipa" onchange="handleGameFileUpload(this)" style="display: none;">
                                        </div>
                                        <div class="v3-sign-file-info" id="gameFileInfo">
                                            <i class="fa fa-gamepad"></i>
                                            <div class="file-details">
                                                <div class="file-name" id="gameFileName"></div>
                                                <div class="file-size" id="gameFileSize"></div>
                                            </div>
                                            <button type="button" class="remove-btn" onclick="removeGameFile()"><i class="fa fa-times-circle"></i></button>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- 选择模式 -->
                                <div id="game_select_mode" class="game-mode" style="display:none;">
                                    <div class="form-input" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;" onclick="openGameSelectModal()">
                                        <span id="selectedGameText" style="color: var(--gray-600);">点击选择已有游戏</span>
                                        <i class="fa fa-chevron-right" style="color: var(--gray-400);"></i>
                                    </div>
                                </div>
                            </div>
                            <!-- 上传ICON区域 -->
                            <div class="form-group">
                                <label class="form-label">icon <span class="required">*</span></label>
                                <div id="iconUploadBtn" onclick="document.getElementById('iconInput').click()" style="width: 80px;height: 80px;border: 2px dashed var(--gray-300);border-radius: 8px;display: flex;flex-direction: column;align-items: center;justify-content: center;cursor: pointer;transition: all 0.2s;background: var(--gray-100);">
                                    <i class="fa fa-upload" style="font-size: 24px;color: var(--gray-400);"></i>
                                    <span style="font-size: 11px;color: var(--gray-400);margin-top: 4px;">上传ICON</span>
                                    <input type="file" id="iconInput" accept="image/*" style="display: none;" onchange="handleIconUpload(this)">
                                </div>
                                <div class="icon-preview-area" id="iconPreviewArea" style="display: none;position: relative;width: 80px;height: 80px;border: 1px solid var(--gray-200);border-radius: 8px;overflow: hidden;">
                                    <img id="iconImg" src="" style="width: 100%;height: 100%;object-fit: cover;">
                                    <div class="icon-preview-overlay" onclick="removeIcon()">
                                        <i class="fa fa-trash" style="font-size: 20px;color: white;"></i>
                                    </div>
                                </div>
                                <div style="font-size: 12px;color: var(--gray-600);margin-top: 4px;">仅支持PNG格式，建议尺寸256x256px</div>
                            </div>
                            <!-- 游戏信息 -->
                            <div class="form-group">
                                <label class="form-label">系统类型 <span class="required">*</span></label>
                                <input type="text" id="systemType" class="form-input" placeholder="上传游戏后自动解析显示" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">游戏名称 <span class="required">*</span></label>
                                <input type="text" id="gameName" class="form-input" placeholder="上传游戏后自动解析显示">
                            </div>
                            <div class="form-group">
                                <label class="form-label">包名 <span class="required">*</span></label>
                                <input type="text" id="packageName" class="form-input" placeholder="例如：com.game.legend.chang">
                            </div>
                            <div class="form-group">
                                <label class="form-label">版本号 <span class="required">*</span></label>
                                <input type="text" id="versionName" class="form-input" placeholder="例如：1.2.1">
                            </div>
                            <div class="form-group">
                                <label class="form-label">推广属性 <span class="required">*</span></label>
                                <div class="channel-input-wrapper">
                                    <input type="text" id="promotionAttr" class="form-input" placeholder="请输入或选择推广属性参数">
                                    <button type="button" class="channel-select-btn" onclick="openChannelModal()" title="选择渠道">
                                        <i class="fa fa-list"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">targetSdkVersion <span class="required">*</span></label>
                                <input type="text" id="targetSdkVersion" class="form-input" placeholder="例如：33">
                            </div>
                            <!-- 签名文件区域 - 单独一行在最下方 -->
                            <div class="form-group col-span-2">
                                <label class="form-label">签名文件 <span class="required">*</span></label>
                                <div class="v3-sign-container">
                                    <div class="v3-sign-upload" id="signUploadArea" onclick="document.getElementById('signInput').click()">
                                        <i class="fa fa-file-code-o"></i>
                                        <p>点击上传签名文件（jks或者keystore）</p>
                                        <input type="file" id="signInput" accept=".keystore,.jks" onchange="handleSignUpload(this)" style="display: none;">
                                    </div>
                                    <div class="v3-sign-file-info" id="signFileInfo">
                                        <i class="fa fa-file-code-o"></i>
                                        <div class="file-details">
                                            <div class="file-name" id="signFileName"></div>
                                            <div class="file-size" id="signFileSize"></div>
                                        </div>
                                        <button type="button" class="remove-btn" onclick="removeSign()"><i class="fa fa-times-circle"></i></button>
                                    </div>
                                </div>
                                <!-- 密钥别名和密钥密码 - 上传后显示 -->
                <div id="keyFieldsContainer" style="margin-top: 16px; display: block;">
                    <div style="display: flex; gap: 24px; align-items: flex-start;">
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label class="form-label">密钥别名 <span class="required">*</span></label>
                            <input type="text" id="keyAlias" class="form-input" placeholder="请输入密钥别名">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label class="form-label">密钥库密码 <span class="required">*</span></label>
                            <input type="password" id="keystorePassword" class="form-input" placeholder="请输入密钥库密码">
                        </div>
                        <div class="form-group" style="flex: 1; margin-bottom: 0;">
                            <label class="form-label">密钥密码 <span class="required">*</span></label>
                            <input type="password" id="keyPassword" class="form-input" placeholder="请输入密钥密码">
                        </div>
                    </div>
                </div>
                            </div>
                            <!-- 埋点选项 - 非必填，独立放在最下方 -->
                            <div class="form-group col-span-2">
                                <label class="form-label">埋点选项</label>
                                <div style="display: flex; gap: 24px;">
                                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                        <input type="text" id="douyinAppId" class="form-input" placeholder="抖音APPID">
                                    </div>
                                    <div class="form-group" style="flex: 1; margin-bottom: 0;">

    <script>
        // 游戏数据
        const gameData = {
            '传奇世界H5': { systemType: 'Android', gameName: '传奇世界H5' },
            '消消乐': { systemType: 'Android', gameName: '消消乐' },
            '三国志': { systemType: 'Android', gameName: '三国志' }
        };

        // 加载渠道到下拉框
        function loadChannelsForRepkg() {
            const sel = document.getElementById('repkg_channelSelect');
            if (!sel) return;
            const channels = JSON.parse(localStorage.getItem('repkg_channels') || '[]');
            sel.innerHTML = '<option value="">请选择渠道</option>' +
                channels.map(c => `<option value="${c.channelCode}">${c.channelName} (${c.channelCode})</option>`).join('');
        }

        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (window.Navigation && Navigation.init) {
                Navigation.init('新建改包');
            }
            
            // 检查登录
            if (!UI.checkLogin()) return;

            // 初始化包名修改范围组件
            repkgPackNameScope = new PackageNameScope('repkg_packNameScopeGroup', null, {
                title: '包名修改范围配置',
                showDefaultTag: true
            });

            // 加载渠道列表到下拉框
            loadChannelsForRepkg();
            
            // 检查改包系统新增权限
            if (!Permission.hasPageAccess('repkg') || !Permission.hasActionPermission('repkg', 'add')) {
                UI.showMessage('error', '您没有访问该页面的权限');
                window.location.href = '母包列表.html';
                return;
            }

            // 初始化UI
            UI.initUserInfo();
            UI.initUserDropdown();
            
            // 绑定事件
            // 初始化侧边栏菜单权限
            // 初始化密钥别名下拉
            initKeyAliasDropdown();

            // 表单提交
            document.getElementById('repkgForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const gameFileInput = document.getElementById('gameFileInput');
                const iconInput = document.getElementById('iconInput');
                const systemType = document.getElementById('systemType').value;
                const gameName = document.getElementById('gameName').value;
                const packageName = document.getElementById('packageName').value;
                const versionName = document.getElementById('versionName').value;
                const promotionAttr = document.getElementById('promotionAttr').value;
                const targetSdkVersion = document.getElementById('targetSdkVersion').value;
                const signInput = document.getElementById('signInput');
                const keyAlias = document.getElementById('keyAlias').value;
                const keystorePassword = document.getElementById('keystorePassword').value;
                const keyPassword = document.getElementById('keyPassword').value;
                
                // 验证上传游戏
                if (!gameFileInput.files || gameFileInput.files.length === 0) {
                    UI.showMessage('error', '请上传游戏母包');
                    return;
                }
                
                // 验证系统类型
                if (!systemType) {
                    UI.showMessage('error', '系统类型不能为空');
                    return;
                }
                
                // 验证游戏名称
                if (!gameName.trim()) {
                    UI.showMessage('error', '游戏名称不能为空');
                    return;
                }
                
                // 验证包名
                if (!packageName.trim()) {
                    UI.showMessage('error', '请输入包名');
                    return;
                }
                
                // 验证版本号
                if (!versionName.trim()) {
                    UI.showMessage('error', '请输入版本号');
                    return;
                }
                
                // 验证推广属性
                if (!promotionAttr.trim()) {
                    UI.showMessage('error', '请输入推广属性');
                    return;
                }
                
                // 验证targetSdkVersion
                if (!targetSdkVersion.trim()) {
                    UI.showMessage('error', '请输入targetSdkVersion');
                    return;
                }
                
                // 验证签名文件
                if (!signInput.files || signInput.files.length === 0) {
                    UI.showMessage('error', '请上传签名文件');
                    return;
                }
                
                // 验证密钥别名
                if (!keyAlias.trim()) {
                    UI.showMessage('error', '请输入密钥别名');
                    return;
                }
                
                // 验证密钥库密码
                if (!keystorePassword.trim()) {
                    UI.showMessage('error', '请输入密钥库密码');
                    return;
                }
                
                // 验证密钥密码
                if (!keyPassword.trim()) {
                    UI.showMessage('error', '请输入密钥密码');
                    return;
                }
                
                // 验证icon
                if (!iconInput.files || iconInput.files.length === 0) {
                    UI.showMessage('error', '请上传icon图片');
                    return;
                }
                
                // 验证签名
                if (!signInput.files || signInput.files.length === 0) {
                    UI.showMessage('error', '请上传签名文件');
                    return;
                }
                
                // 验证通过，显示确认弹窗
                openSubmitModal();
            });
        });

        // 初始化侧边栏菜单权限
        function initMenuPermissions() {
            // 系统管理菜单组
            const systemMenuGroup = document.getElementById('menu-group-system');
            if (systemMenuGroup && Permission.hasPageAccess('system')) {
                systemMenuGroup.style.display = 'block';
            }
        }

        // 上传游戏处理
        function handleGameFileUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // 显示文件信息，隐藏上传按钮
                document.getElementById('gameUploadArea').style.display = 'none';
                document.getElementById('gameFileInfo').classList.add('show');
                document.getElementById('gameFileName').textContent = file.name;
                document.getElementById('gameFileSize').textContent = formatFileSize(file.size);
                
                // 根据文件扩展名判断系统类型
                const fileName = file.name.toLowerCase();
                let systemType = '';
                if (fileName.endsWith('.apk')) {
                    systemType = 'Android';
                } else if (fileName.endsWith('.ipa')) {
                    systemType = 'iOS';
                }
                
                // 模拟解析游戏文件（实际应调用后端API）
                setTimeout(() => {
                    const gameInfo = {
                        systemType: systemType,
                        gameName: file.name.replace(/\.(apk|ipa)$/i, ''),
                        packageName: 'com.game.' + file.name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase().substring(0, 10),
                        versionName: '1.0.0',
                        targetSdkVersion: '33'
                    };
                    
                    document.getElementById('systemType').value = gameInfo.systemType;
                    document.getElementById('gameName').value = gameInfo.gameName;
                    document.getElementById('packageName').value = gameInfo.packageName;
                    document.getElementById('versionName').value = gameInfo.versionName;
                    document.getElementById('targetSdkVersion').value = gameInfo.targetSdkVersion;
                    
                    UI.showMessage('success', '游戏母包解析成功');
                }, 500);
            }
        }
        
        function removeGameFile() {
            document.getElementById('gameFileInput').value = '';
            
            // 隐藏文件信息，显示上传按钮
            document.getElementById('gameUploadArea').style.display = 'flex';
            document.getElementById('gameFileInfo').classList.remove('show');
            
            // 清空游戏信息
            document.getElementById('systemType').value = '';
            document.getElementById('gameName').value = '';
            document.getElementById('packageName').value = '';
            document.getElementById('versionName').value = '';
            document.getElementById('targetSdkVersion').value = '';
        }
        
        // 上传ICON处理
        function handleIconUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                // 验证文件类型
                if (!file.type.startsWith('image/')) {
                    UI.showMessage('error', '请选择图片文件');
                    input.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 隐藏上传按钮，显示预览区域
                    document.getElementById('iconUploadBtn').style.display = 'none';
                    const previewArea = document.getElementById('iconPreviewArea');
                    previewArea.style.display = 'block';
                    document.getElementById('iconImg').src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }
        
        function removeIcon() {
            document.getElementById('iconInput').value = '';
            // 隐藏预览区域，显示上传按钮
            document.getElementById('iconPreviewArea').style.display = 'none';
            document.getElementById('iconUploadBtn').style.display = 'flex';
            document.getElementById('iconImg').src = '';
        }
        
        // 签名上传处理
        function handleSignUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // 显示文件信息，隐藏上传按钮
                document.getElementById('signUploadArea').style.display = 'none';
                document.getElementById('signFileInfo').classList.add('show');
                document.getElementById('signFileName').textContent = file.name;
                document.getElementById('signFileSize').textContent = formatFileSize(file.size);
                
                // 模拟解析签名文件，获取密钥别名列表
                const keyAliases = parseSignFile(file);
                
                // 显示密钥别名和密钥密码
                showKeyFields(keyAliases);
            }
        }
        
        function removeSign() {
            document.getElementById('signInput').value = '';
            
            // 隐藏文件信息，显示上传按钮
            document.getElementById('signUploadArea').style.display = 'flex';
            document.getElementById('signFileInfo').classList.remove('show');

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // ===== GameAutoModifyPackParameterInfoBean 联动函数 =====
        function toggleRepkgField(selectId, scopeGroupId, wrapId) {
            const v = document.getElementById(selectId).value === 'true';
            if (wrapId) document.getElementById(wrapId).style.display = v ? '' : 'none';
            if (scopeGroupId) document.getElementById(scopeGroupId).style.display = v ? '' : 'none';
        }

        // 渠道数据（模拟）
        const channelData = [
            { id: 1, platform: '抖音', account: 'douyin_001' },
            { id: 2, platform: '抖音', account: 'douyin_002' },
            { id: 3, platform: '快手', account: 'kuaishou_001' },
            { id: 4, platform: '快手', account: 'kuaishou_002' },
            { id: 5, platform: '微信', account: 'wechat_001' },
            { id: 6, platform: '微信', account: 'wechat_002' },
            { id: 7, platform: '应用宝', account: 'yb_001' },
            { id: 8, platform: '华为', account: 'huawei_001' },
            { id: 9, platform: '小米', account: 'xiaomi_001' },
            { id: 10, platform: 'OPPO', account: 'oppo_001' },
            { id: 11, platform: 'VIVO', account: 'vivo_001' },
            { id: 12, platform: '百度', account: 'baidu_001' },
            { id: 13, platform: '头条', account: 'toutiao_001' },
            { id: 14, platform: 'UC', account: 'uc_001' },
            { id: 15, platform: 'B站', account: 'bilibili_001' }
        ];

        let selectedChannels = [];
        let currentPage = 1;
        const pageSize = 5;

        // ===== 平台多选筛选 =====
        let selectedPlatforms = [];           // 已选平台（已确认）
        let tempSelectedPlatforms = [];       // 下拉框中临时勾选（未点确定）

        // ===== 渠道账号多选筛选 =====
        let selectedAccounts = [];            // 已选账号（已确认）
        let tempSelectedAccounts = [];        // 下拉框中临时勾选（未点确定）

        // 获取所有不重复的平台列表
        function getUniquePlatforms() {
            return [...new Set(channelData.map(c => c.platform))].sort();
        }

        // 获取所有不重复的渠道账号列表
        function getUniqueAccounts() {
            return [...new Set(channelData.map(c => c.account))].sort();
        }

        // ---- 平台下拉 ----
        function renderPlatformDropdown() {
            const platforms = getUniquePlatforms();
            const listEl = document.getElementById('platformDropdownList');
            listEl.innerHTML = platforms.map(p => {
                const checked = tempSelectedPlatforms.includes(p);
                return `<div class="platform-dropdown-item" onclick="toggleTempPlatform('${p.replace(/'/g, "\\'")}')">
                    <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation()">
                    <label>${p}</label>
                </div>`;
            }).join('');
        }

        function toggleTempPlatform(platform) {
            const idx = tempSelectedPlatforms.indexOf(platform);
            if (idx > -1) { tempSelectedPlatforms.splice(idx, 1); }
            else { tempSelectedPlatforms.push(platform); }
            renderPlatformDropdown();
        }

        function applyPlatformFilter() {
            selectedPlatforms = [...tempSelectedPlatforms];
            closePlatformDropdown();
            renderAllTags();
        }

        function clearPlatformFilter(event) {
            if (event) event.stopPropagation();
            tempSelectedPlatforms = [];
            selectedPlatforms = [];
            renderPlatformDropdown();
            renderAllTags();
        }

        function togglePlatformDropdown() {
            const dropdown = document.getElementById('platformDropdown');
            if (dropdown.classList.contains('show')) {
                closePlatformDropdown();
            } else {
                closeAccountDropdown();
                tempSelectedPlatforms = [...selectedPlatforms];
                renderPlatformDropdown();
                dropdown.classList.add('show');
            }
        }

        function closePlatformDropdown() {
            document.getElementById('platformDropdown').classList.remove('show');
        }

        // ---- 账号下拉 ----
        function renderAccountDropdown() {
            const accounts = getUniqueAccounts();
            const listEl = document.getElementById('accountDropdownList');
            listEl.innerHTML = accounts.map(a => {
                const checked = tempSelectedAccounts.includes(a);
                return `<div class="platform-dropdown-item" onclick="toggleTempAccount('${a.replace(/'/g, "\\'")}')">
                    <input type="checkbox" ${checked ? 'checked' : ''} onclick="event.stopPropagation()">
                    <label>${a}</label>
                </div>`;
            }).join('');
        }

        function toggleTempAccount(account) {
            const idx = tempSelectedAccounts.indexOf(account);
            if (idx > -1) { tempSelectedAccounts.splice(idx, 1); }
            else { tempSelectedAccounts.push(account); }
            renderAccountDropdown();
        }

        function applyAccountFilter() {
            selectedAccounts = [...tempSelectedAccounts];
            closeAccountDropdown();
            renderAllTags();
        }

        function clearAccountFilter(event) {
            if (event) event.stopPropagation();
            tempSelectedAccounts = [];
            selectedAccounts = [];
            renderAccountDropdown();
            renderAllTags();
        }

        function toggleAccountDropdown() {
            const dropdown = document.getElementById('accountDropdown');
            if (dropdown.classList.contains('show')) {
                closeAccountDropdown();
            } else {
                closePlatformDropdown();
                tempSelectedAccounts = [...selectedAccounts];
                renderAccountDropdown();
                dropdown.classList.add('show');
            }
        }

        function closeAccountDropdown() {
            document.getElementById('accountDropdown').classList.remove('show');
        }

        // ---- 统一标签渲染（平台 + 账号） ----
        function renderAllTags() {
            const container = document.getElementById('platformSelectedTags');
            const platformBtn = document.getElementById('platformFilterBtn');
            const platformText = document.getElementById('platformFilterText');
            const accountBtn = document.getElementById('accountFilterBtn');
            const accountText = document.getElementById('accountFilterText');

            let tagsHtml = '';

            // 平台标签
            selectedPlatforms.forEach(p => {
                tagsHtml += `<span class="platform-tag">平台:${p}
                    <span class="platform-tag-remove" onclick="removePlatformFilter('${p.replace(/'/g, "\\'")}')">&times;</span>
                </span>`;
            });

            // 账号标签
            selectedAccounts.forEach(a => {
                tagsHtml += `<span class="platform-tag account-tag">账号:${a}
                    <span class="platform-tag-remove" onclick="removeAccountFilter('${a.replace(/'/g, "\\'")}')">&times;</span>
                </span>`;
            });

            container.innerHTML = tagsHtml;

            // 更新按钮文字
            platformText.textContent = selectedPlatforms.length > 0
                ? `所属平台 (${selectedPlatforms.length})` : '所属平台';
            platformBtn.classList.toggle('active', selectedPlatforms.length > 0);

            accountText.textContent = selectedAccounts.length > 0
                ? `渠道账号 (${selectedAccounts.length})` : '渠道账号';
            accountBtn.classList.toggle('active', selectedAccounts.length > 0);
        }

        function removePlatformFilter(platform) {
            selectedPlatforms = selectedPlatforms.filter(p => p !== platform);
            tempSelectedPlatforms = tempSelectedPlatforms.filter(p => p !== platform);
            renderAllTags();
            renderPlatformDropdown();
        }

        function removeAccountFilter(account) {
            selectedAccounts = selectedAccounts.filter(a => a !== account);
            tempSelectedAccounts = tempSelectedAccounts.filter(a => a !== account);
            renderAllTags();
            renderAccountDropdown();
        }

        // ---- 点击外部关闭所有下拉 ----
        document.addEventListener('click', function(e) {
            const pw = document.getElementById('platformFilterWrapper');
            const aw = document.getElementById('accountFilterWrapper');
            if (pw && !pw.contains(e.target)) closePlatformDropdown();
            if (aw && !aw.contains(e.target)) closeAccountDropdown();
        });

        // ---- 综合筛选 ----
        function getFilteredChannels() {
            let filtered = [...channelData];
            if (selectedPlatforms.length > 0) {
                filtered = filtered.filter(c => selectedPlatforms.includes(c.platform));
            }
            if (selectedAccounts.length > 0) {
                filtered = filtered.filter(c => selectedAccounts.includes(c.account));
            }
            return filtered;
        }

        // ---- 打开弹窗（修复回显） ----
        function openChannelModal() {
            currentPage = 1;

            // 从推广属性输入框回显已选渠道
            const inputVal = document.getElementById('promotionAttr').value;
            if (inputVal.trim()) {
                selectedChannels = inputVal.split(';').filter(Boolean).map(item => {
                    const colonIdx = item.indexOf(':');
                    if (colonIdx > -1) {
                        const platform = item.substring(0, colonIdx);
                        const account = item.substring(colonIdx + 1);
                        return channelData.find(c => c.platform === platform && c.account === account);
                    }
                    return undefined;
                }).filter(Boolean);
            }

            // 重置筛选条件，让用户从全部数据开始
            selectedPlatforms = [];
            selectedAccounts = [];
            tempSelectedPlatforms = [];
            tempSelectedAccounts = [];

            renderAllTags();
            renderChannelList();
            document.getElementById('channelModal').classList.add('show');
        }

        // 关闭渠道选择弹窗
        function closeChannelModal() {
            document.getElementById('channelModal').classList.remove('show');
        }

        // ---- 渠道列表渲染 ----
        function renderChannelList() {
            const listContainer = document.getElementById('channelList');
            const filteredChannels = getFilteredChannels();

            const totalPages = Math.ceil(filteredChannels.length / pageSize);
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;
            
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageChannels = filteredChannels.slice(startIndex, endIndex);

            if (filteredChannels.length === 0) {
                listContainer.innerHTML = '<div class="channel-empty">没有找到匹配的渠道</div>';
                document.getElementById('channelPagination').innerHTML = '';
                updateChannelCount();
                return;
            }

            listContainer.innerHTML = pageChannels.map(channel => {
                const isSelected = selectedChannels.some(c => c.id === channel.id);
                return `
                    <div class="channel-item ${isSelected ? 'selected' : ''}" onclick="toggleChannel(${channel.id}, event)">
                        <div><input type="checkbox" class="channel-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation()"></div>
                        <div class="channel-platform">${channel.platform}</div>
                        <div class="channel-account">${channel.account}</div>
                    </div>
                `;
            }).join('');

            renderPagination(filteredChannels.length, totalPages);
            updateSelectAllState();
            updateChannelCount();
        }

        // ---- 分页 ----
        function renderPagination(total, totalPages) {
            const paginationContainer = document.getElementById('channelPagination');
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span>...</span>`;
                }
            }
            
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<span>共 ${total} 条</span>`;
            
            paginationContainer.innerHTML = html;
        }

        function goToPage(page) {
            const filteredChannels = getFilteredChannels();
            const totalPages = Math.ceil(filteredChannels.length / pageSize);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderChannelList();
            }
        }

        // ---- 渠道勾选 ----
        function toggleChannel(channelId, event) {
            if (event) event.stopPropagation();
            const channel = channelData.find(c => c.id === channelId);
            if (!channel) return;

            const index = selectedChannels.findIndex(c => c.id === channelId);
            if (index > -1) {
                selectedChannels.splice(index, 1);
            } else {
                selectedChannels.push(channel);
            }
            renderChannelList();
        }

        function toggleSelectAllChannels() {
            const selectAllCheckbox = document.getElementById('channelSelectAll');
            const filteredChannels = getFilteredChannels();

            if (selectAllCheckbox.checked) {
                filteredChannels.forEach(channel => {
                    if (!selectedChannels.some(c => c.id === channel.id)) {
                        selectedChannels.push(channel);
                    }
                });
            } else {
                filteredChannels.forEach(channel => {
                    const index = selectedChannels.findIndex(c => c.id === channel.id);
                    if (index > -1) selectedChannels.splice(index, 1);
                });
            }
            renderChannelList();
        }

        function updateSelectAllState() {
            const filteredChannels = getFilteredChannels();
            const allSelected = filteredChannels.every(channel =>
                selectedChannels.some(c => c.id === channel.id)
            );
            const someSelected = filteredChannels.some(channel =>
                selectedChannels.some(c => c.id === channel.id)
            );
            const selectAllCheckbox = document.getElementById('channelSelectAll');
            selectAllCheckbox.checked = allSelected;
            selectAllCheckbox.indeterminate = someSelected && !allSelected;
        }

        function filterChannels() {
            currentPage = 1;
            renderChannelList();
        }

        function updateChannelCount() {
            document.getElementById('channelCount').textContent = selectedChannels.length;
        }

        // ---- 确认选择 ----
        function confirmChannelSelection() {
            const promotionAttr = selectedChannels.map(c => `${c.platform}:${c.account}`).join(';');
            document.getElementById('promotionAttr').value = promotionAttr;
            closeChannelModal();
        }

        // ---- 游戏选择功能 ----
        let selectedGame = null;

        function switchGameMode(mode) {
            // 切换标签样式
            document.getElementById('tab_upload').className = `btn btn-sm ${mode === 'upload' ? 'btn-primary' : 'btn-default'}`;
            document.getElementById('tab_select').className = `btn btn-sm ${mode === 'select' ? 'btn-primary' : 'btn-default'}`;
            // 显示对应内容
            document.getElementById('game_upload_mode').style.display = mode === 'upload' ? 'block' : 'none';
            document.getElementById('game_select_mode').style.display = mode === 'select' ? 'block' : 'none';
            // 清空选择
            selectedGame = null;
            document.getElementById('selectedGameText').textContent = '点击选择已有游戏';
            document.getElementById('selectedGameText').style.color = 'var(--gray-600)';
            // 清空表单
            document.getElementById('gameName').value = '';
            document.getElementById('packageName').value = '';
            document.getElementById('versionName').value = '';
            document.getElementById('targetSdkVersion').value = '';
            document.getElementById('systemType').value = '';
        }

        function openGameSelectModal() {
            document.getElementById('gameSelectModal').classList.add('show');
            renderGameSelectTable();
        }

        function closeGameSelectModal() {
            document.getElementById('gameSelectModal').classList.remove('show');
        }

        function renderGameSelectTable() {
            const keyword = document.getElementById('gs_searchInput').value.trim().toLowerCase();
            const systemFilter = document.getElementById('gs_systemFilter').value;
            // 从localStorage获取游戏列表
            const games = JSON.parse(localStorage.getItem('repkg_games') || '[]');
            // 过滤
            let filtered = games;
            if (keyword) {
                filtered = filtered.filter(g => 
                    (g.gameName && g.gameName.toLowerCase().includes(keyword)) ||
                    (g.packageName && g.packageName.toLowerCase().includes(keyword))
                );
            }
            if (systemFilter) {
                filtered = filtered.filter(g => g.systemType === systemFilter);
            }

            const tbody = document.getElementById('gs_tbody');
            const empty = document.getElementById('gs_empty');

            if (filtered.length === 0) {
                document.getElementById('gs_table').style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            document.getElementById('gs_table').style.display = '';
            empty.style.display = 'none';

            tbody.innerHTML = filtered.map(g => `
                <tr>
                    <td><code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;font-size:12px;">${g.id || '-'}</code></td>
                    <td><strong>${g.gameName || '-'}</strong></td>
                    <td>${g.platformName || '-'}</td>
                    <td>${g.systemType || '-'}</td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${g.packageName || '-'}</td>
                    <td>${g.versionName || '-'}</td>
                    <td>
                        <button class="ps-select-btn" onclick="selectGame(${JSON.stringify(g).replace(/"/g, '&quot;')})">选择</button>
                    </td>
                </tr>
            `).join('');
        }

        function selectGame(game) {
            selectedGame = game;
            // 回显选择信息
            const textEl = document.getElementById('selectedGameText');
            textEl.textContent = `${game.gameName}（${game.systemType}）`;
            textEl.style.color = 'var(--gray-900)';
            // 填充表单
            document.getElementById('gameName').value = game.gameName || '';
            document.getElementById('packageName').value = game.packageName || '';
            document.getElementById('versionName').value = game.versionName || '';
            document.getElementById('targetSdkVersion').value = game.targetSdkVersion || '';
            document.getElementById('systemType').value = game.systemType || '';
            // 关闭弹窗
            closeGameSelectModal();
            UI.showMessage('success', '游戏选择成功');
        }
    </script>

    <!-- 游戏选择弹窗 -->
    <div class="modal-overlay" id="gameSelectModal">
        <div class="modal platform-select-modal">
            <div class="modal-header">
                <div class="modal-title">选择游戏</div>
                <button class="modal-close" onclick="closeGameSelectModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding:16px 24px;overflow:hidden;display:flex;flex-direction:column;">
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
                    <input type="text" class="form-input" id="gs_searchInput" placeholder="搜索游戏名称/包名" style="width:240px;height:36px;font-size:13px;" onkeyup="if(event.key==='Enter')renderGameSelectTable()">
                    <select class="form-select" id="gs_systemFilter" style="width:120px;height:36px;font-size:13px;" onchange="renderGameSelectTable()">
                        <option value="">全部系统</option>
                        <option value="Android">Android</option>
                        <option value="iOS">iOS</option>
                    </select>
                    <button class="btn btn-sm btn-primary" onclick="renderGameSelectTable()">搜索</button>
                </div>
                <div style="overflow:auto;max-height:400px;">
                    <table class="platform-select-table" id="gs_table">
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-name">游戏名称</th>
                                <th class="col-company">所属平台</th>
                                <th>系统类型</th>

                                <th>版本号</th>
                                <th class="col-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="gs_tbody"></tbody>
                    </table>
                    <div id="gs_empty" style="display:none;text-align:center;padding:40px;color:var(--gray-600);">暂无匹配的游戏数据</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" onclick="closeGameSelectModal()">取消</button>
            </div>
        </div>
    </div>
