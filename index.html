<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线分包管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;}
        body {
            font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fff8e1 100%);
        }
        /* 整体容器 */
        .login-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        /* 左侧区域 */
        .left-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
        }

        /* 平台Logo和标语 */
        .platform-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #37474f;
        }
        .platform-logo {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            background: linear-gradient(135deg, #4fc3f7 0%, #7c4dff 100%);
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(124, 77, 255, 0.25);
            animation: logoBounce 4s ease-in-out infinite;
        }
        .platform-logo i {
            font-size: 72px;
            color: white;
        }
        @keyframes logoBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .platform-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #4fc3f7 0%, #7c4dff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .platform-slogan {
            font-size: 18px;
            color: #78909c;
            margin-bottom: 36px;
            font-weight: 400;
            line-height: 1.6;
        }
        /* 特性列表 */
        .features {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .feature-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1) 0%, rgba(124, 77, 255, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .feature-icon i {
            font-size: 24px;
            color: #7c4dff;
        }
        .feature-text {
            font-size: 16px;
        }
        .feature-text .feature-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: #37474f;
        }
        .feature-text .feature-desc {
            color: #78909c;
            font-size: 14px;
        }
        /* 右侧登录区域 */
        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
            background: transparent;
        }
        /* 登录框 */
        .login-box {
            background: white;
            padding: 50px 45px;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04) inset;
            width: 460px;
            position: relative;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 登录头部 */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4fc3f7 0%, #7c4dff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #90a4ae;
        }
        /* 表单组 */
        .form-group {
            margin-bottom: 26px;
            position: relative;
        }
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #546e7a;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #90a4ae;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .form-input {
            width: 100%;
            height: 54px;
            padding: 0 18px 0 52px;
            border: 2px solid #eceff1;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fafbfc;
        }
        .form-input:focus {
            outline: none;
            border-color: #4fc3f7;
            background: white;
            box-shadow: 0 0 0 5px rgba(79, 195, 247, 0.12);
        }
        .form-input:focus + i {
            color: #4fc3f7;
            transform: translateY(-50%) scale(1.1);
        }
        /* 按钮 */
        .btn {
            padding: 16px 36px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #7c4dff 100%);
            color: white;
            width: 100%;
            height: 54px;
            box-shadow: 0 8px 25px rgba(124, 77, 255, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(124, 77, 255, 0.35);
        }
        .btn-primary:active {
            transform: translateY(-1px);
        }
        /* 记住我和忘记密码 */
        .remember {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .remember label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #78909c;
            cursor: pointer;
        }
        .remember input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #4fc3f7;
            cursor: pointer;
        }
        .forgot {
            font-size: 14px;
            color: #7c4dff;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .forgot:hover {
            color: #4fc3f7;
        }
        /* 消息提示 */
        .message-box {
            position: fixed;
            top: 80px;
            right: 24px;
            padding: 16px 32px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            z-index: 99999;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 320px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .message-success {
            background: linear-gradient(135deg, #69f0ae 0%, #00e676 100%);
        }
        .message-error {
            background: linear-gradient(135deg, #ff8a80 0%, #ff5252 100%);
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        /* 默认账号提示 */
        .default-account {
            margin-top: 20px;
            padding: 12px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(79, 195, 247, 0.2);
        }
        .default-account p {
            font-size: 13px;
            color: #546e7a;
            margin-bottom: 6px;
        }
        .default-account code {
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            color: #7c4dff;
        }
        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal {
            background: white;
            border-radius: 24px;
            padding: 0;
            width: 460px;
            max-width: 90vw;
            animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #eceff1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(79,195,247,0.05) 0%, rgba(124,77,255,0.05) 100%);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #37474f;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #90a4ae;
            padding: 4px;
            line-height: 1;
            transition: all 0.3s ease;
            border-radius: 8px;
        }
        .modal-close:hover {
            color: #455a64;
            background: rgba(0,0,0,0.05);
        }
        .modal-body {
            padding: 32px;
        }
        .modal-footer {
            padding: 20px 32px;
            border-top: 1px solid #eceff1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #fafbfc;
        }
        .btn-default {
            background: white;
            color: #546e7a;
            border: 2px solid #eceff1;
            height: 48px;
        }
        .btn-default:hover {
            border-color: #4fc3f7;
            color: #4fc3f7;
        }
        .btn-primary-small {
            background: linear-gradient(135deg, #4fc3f7 0%, #7c4dff 100%);
            color: white;
            height: 48px;
            padding: 0 28px;
        }
        .btn-primary-small:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,77,255,0.25);
        }
        /* 表单验证错误 */
        .form-group.error .form-input {
            border-color: #ff5252;
        }
        .form-error {
            color: #ff5252;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .form-group.error .form-error {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧区域 -->
        <div class="left-section">
            <div class="platform-content">
                <div class="platform-logo">
                    <i class="fa fa-cubes"></i>
                </div>
                <div class="platform-title">在线分包管理系统</div>
                <div class="platform-slogan">高效便捷 · 智能管理 · 一键改包</div>
                <div class="features">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fa fa-package"></i>
                        </div>
                        <div class="feature-text">
                            <div class="feature-title">智能分包</div>
                            <div class="feature-desc">自动化处理，提升工作效率</div>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fa fa-tasks"></i>
                        </div>
                        <div class="feature-text">
                            <div class="feature-title">任务管理</div>
                            <div class="feature-desc">流程化控制，任务清晰明了</div>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fa fa-users"></i>
                        </div>
                        <div class="feature-text">
                            <div class="feature-title">权限控制</div>
                            <div class="feature-desc">精细化权限，数据安全可靠</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧登录区域 -->
        <div class="right-section">
            <div class="login-box">
                <div class="login-header">
                    <div class="login-title">欢迎登录</div>
                    <div class="login-subtitle">在线分包管理系统</div>
                </div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">账号</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-input" placeholder="请输入账号" value="admin">
                    <i class="fa fa-user"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" value="Admin123">
                    <i class="fa fa-lock"></i>
                </div>
            </div>
            <div class="remember">
                <label>
                    <input type="checkbox" checked>
                    记住我
                </label>
                <a href="#" class="forgot" onclick="openForgotPasswordModal(event)">忘记密码？</a>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fa fa-sign-in"></i>
                登录
            </button>
        </form>
        <div class="default-account">
            <p>默认账号：</p>
            <p><code>账号: admin / 密码: Admin123</code></p>
        </div>
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div class="modal-overlay" id="forgotPasswordModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fa fa-key" style="margin-right: 10px;color: #4fc3f7;"></i>
                    重置密码
                </div>
                <button class="modal-close" onclick="closeForgotPasswordModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="forgotPasswordForm">
                    <div class="form-group" id="usernameGroup">
                        <label class="form-label">账号 <span style="color: #ff5252;">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="resetUsername" class="form-input" placeholder="请输入要重置密码的账号" onblur="autoFillPhone()">
                            <i class="fa fa-user"></i>
                        </div>
                        <div class="form-error" id="usernameError">请输入账号</div>
                    </div>
                    <div class="form-group" id="phoneGroup">
                        <label class="form-label">手机号 <span style="color: #78909c;">（自动填充）</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="resetPhone" class="form-input" placeholder="请先输入账号" readonly style="background: #fafbfc;color: #546e7a;cursor: not-allowed;">
                            <i class="fa fa-mobile"></i>
                        </div>
                        <div class="form-error" id="phoneError"></div>
                    </div>
                    <div class="form-group" id="newPasswordGroup">
                        <label class="form-label">新密码 <span style="color: #ff5252;">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="resetNewPassword" class="form-input" placeholder="请输入新密码（至少8位）">
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="form-error" id="newPasswordError">请输入新密码</div>
                    </div>
                    <div class="form-group" id="confirmPasswordGroup">
                        <label class="form-label">确认新密码 <span style="color: #ff5252;">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="resetConfirmPassword" class="form-input" placeholder="请再次输入新密码">
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="form-error" id="confirmPasswordError">请再次输入新密码</div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default btn-primary-small" onclick="closeForgotPasswordModal()">取消</button>
                <button class="btn btn-primary btn-primary-small" onclick="resetPassword()">
                    <i class="fa fa-check"></i>
                    确认重置
                </button>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        function showMessage(type, message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-box message-${type}`;
            if (type === 'success') messageDiv.innerHTML = `<i class="fa fa-check-circle" style="margin-right: 10px;"></i>${message}`;
            else if (type === 'error') messageDiv.innerHTML = `<i class="fa fa-times-circle" style="margin-right: 10px;"></i>${message}`;
            document.body.appendChild(messageDiv);
            setTimeout(() => {
                messageDiv.style.animation = 'slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) reverse';
                setTimeout(() => messageDiv.remove(), 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化默认数据
            Storage.initDefaultData();
            
            // 如果已登录，直接跳转到首页
            if (Storage.getCurrentUser()) {
                window.location.href = '母包列表.html';
                return;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('error', '请输入账号和密码');
                return;
            }

            // 使用 UserManager 进行登录验证
            const result = UserManager.login(username, password);
            
            if (result.success) {
                showMessage('success', '登录成功，正在跳转...');
                setTimeout(() => {
                    window.location.href = '母包列表.html';
                }, 1000);
            } else {
                showMessage('error', result.message);
            }
        });

        // 打开忘记密码弹窗
        function openForgotPasswordModal(event) {
            event.preventDefault();
            document.getElementById('forgotPasswordModal').classList.add('show');
            clearForgotPasswordForm();
        }

        // 关闭忘记密码弹窗
        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.remove('show');
            clearForgotPasswordForm();
        }

        // 清空忘记密码表单
        function clearForgotPasswordForm() {
            document.getElementById('resetUsername').value = '';
            document.getElementById('resetPhone').value = '';
            document.getElementById('resetNewPassword').value = '';
            document.getElementById('resetConfirmPassword').value = '';
            clearErrors();
        }

        // 清除错误状态
        function clearErrors() {
            ['usernameGroup', 'phoneGroup', 'newPasswordGroup', 'confirmPasswordGroup'].forEach(id => {
                document.getElementById(id)?.classList.remove('error');
            });
        }

        // 自动填充手机号
        function autoFillPhone() {
            const username = document.getElementById('resetUsername').value.trim();
            const resetPhoneInput = document.getElementById('resetPhone');
            
            if (!username) {
                resetPhoneInput.value = '';
                resetPhoneInput.placeholder = '请先输入账号';
                return;
            }

            // 查找用户
            const users = Storage.getUsers();
            const user = users.find(u => u.username === username);
            
            if (user && user.phone) {
                // 找到用户且有绑定手机号
                resetPhoneInput.value = user.phone;
                resetPhoneInput.placeholder = '';
            } else {
                // 未找到用户或没有绑定手机号
                resetPhoneInput.value = '';
                resetPhoneInput.placeholder = user ? '该账号未绑定手机号' : '该账号不存在';
            }
        }

        // 验证手机号格式
        function validatePhone(phone) {
            const phoneRegex = /^1[3-9]\d{9}$/;
            return phoneRegex.test(phone);
        }

        // 重置密码
        function resetPassword() {
            clearErrors();
            
            const username = document.getElementById('resetUsername').value.trim();
            const phone = document.getElementById('resetPhone').value.trim();
            const newPassword = document.getElementById('resetNewPassword').value;
            const confirmPassword = document.getElementById('resetConfirmPassword').value;
            
            let hasError = false;

            // 验证账号
            if (!username) {
                document.getElementById('usernameGroup').classList.add('error');
                document.getElementById('usernameError').textContent = '请输入账号';
                hasError = true;
            }

            // 验证手机号（自动填充）
            if (!phone) {
                document.getElementById('phoneGroup').classList.add('error');
                document.getElementById('phoneError').textContent = '该账号未绑定手机号，无法重置密码';
                hasError = true;
            } else if (!validatePhone(phone)) {
                document.getElementById('phoneGroup').classList.add('error');
                document.getElementById('phoneError').textContent = '绑定的手机号格式错误';
                hasError = true;
            }

            // 验证新密码
            if (!newPassword) {
                document.getElementById('newPasswordGroup').classList.add('error');
                document.getElementById('newPasswordError').textContent = '请输入新密码';
                hasError = true;
            } else if (newPassword.length < 8) {
                document.getElementById('newPasswordGroup').classList.add('error');
                document.getElementById('newPasswordError').textContent = '密码长度至少8位';
                hasError = true;
            }

            // 验证确认密码
            if (!confirmPassword) {
                document.getElementById('confirmPasswordGroup').classList.add('error');
                document.getElementById('confirmPasswordError').textContent = '请再次输入新密码';
                hasError = true;
            } else if (confirmPassword !== newPassword) {
                document.getElementById('confirmPasswordGroup').classList.add('error');
                document.getElementById('confirmPasswordError').textContent = '两次密码输入不一致';
                hasError = true;
            }

            if (hasError) return;

            // 查找用户
            const users = Storage.getUsers();
            const userIndex = users.findIndex(u => u.username === username);
            
            if (userIndex === -1) {
                document.getElementById('usernameGroup').classList.add('error');
                document.getElementById('usernameError').textContent = '该账号不存在';
                return;
            }

            // 验证手机号是否匹配
            const user = users[userIndex];
            if (user.phone && user.phone !== phone) {
                document.getElementById('phoneGroup').classList.add('error');
                document.getElementById('phoneError').textContent = '手机号与该账号不匹配';
                return;
            }

            // 更新密码
            users[userIndex].password = newPassword;
            Storage.saveUsers(users);

            showMessage('success', '密码重置成功，请使用新密码登录');
            closeForgotPasswordModal();
            
            // 自动填充账号
            document.getElementById('username').value = username;
            document.getElementById('password').value = '';
        }

        // 点击遮罩关闭弹窗
        document.getElementById('forgotPasswordModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotPasswordModal();
            }
        });
    </script>
</body>
</html>
